version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosec
    - errorlint
    - revive
    - gocritic
    - sloglint
    - nilerr
    - forbidigo
    - depguard
    - durationcheck
    - exhaustive
    - cyclop
    - gocognit
  disable:
    - exhaustruct
    - varnamelen
  settings:
    cyclop:
      max-complexity: 15
    gocognit:
      min-complexity: 20
    exhaustive:
      default-signifies-exhaustive: true
    sloglint:
      static-msg: true
      key-naming-case: snake
      forbidden-keys:
        - error  # canonical key is "err" — wider Go ecosystem standardizes on err
    revive:
      rules:
        # internal/runtime is an intentional name for the runtime abstraction
        # layer — not a collision with Go's stdlib "runtime" in practice.
        - name: redefines-builtin-id
          disabled: true
    depguard:
      rules:
        # G7 runtime-abstraction fence: internal/cli and internal/mcpsrv must
        # reach the runtime layer through the public yoloai spine (the
        # BackendName / IsolationMode / VMCensus re-exports and the
        # SystemClient / Client verbs), never by importing the internal/runtime
        # abstraction (or any backend subpackage) directly. This is the runtime
        # twin of cli-sandbox-scope: it keeps the CLI/MCP honest about
        # what a separate-module daemon could do through the public surface.
        #
        # Scope: internal/cli/** and internal/mcpsrv/** (non-test). The root
        # yoloai package legitimately wraps internal/runtime (including the tart
        # backend, via the public SystemClient.TartBases handle) and lives
        # outside these globs, so it is naturally unmatched. No CLI/MCP
        # exemption remains: `yoloai system tart` now drives the backend through
        # TartBases, so the former system/tart carve-out (W-L13) is gone.
        cli-runtime-scope:
          list-mode: lax
          files:
            - "**/internal/cli/**"
            - "**/internal/mcpsrv/**"
            - "!$test"
          deny:
            - pkg: "github.com/kstenerud/yoloai/internal/runtime"
              desc: "internal/cli and internal/mcpsrv must not import the internal/runtime abstraction directly (the deny is prefix-wide, so it also covers every backend subpackage like internal/runtime/tart) — use the public yoloai types (BackendName/IsolationMode/VMCensus/…) and SystemClient/Client verbs (G7)."
        # F1 Half-B + G2 layering gate: internal/cli and internal/mcpsrv must
        # reach sandbox behavior through the public spine (yoloai.Client /
        # Sandbox / Workdir / SystemClient + yoloai.* re-exports), never by
        # importing the internal/sandbox façade OR any of its leaf subpackages
        # (store / patch / archetype / status / …). The whole subtree is an
        # internal seam, not a consumer surface; reaching into it would
        # reintroduce the layering inversion the layering-refactor branch
        # removed. (Half-B originally fenced only the façade and allow-listed
        # the store/patch/archetype leaves while the CLI still read them
        # directly; G7 gave every reach-in a public verb, so G2 drops the
        # allow-list and the deny now covers the entire subtree by prefix.)
        #
        # Scope: the rule targets only internal/cli/** and internal/mcpsrv/**
        # (non-test). The root yoloai package (client.go, sandbox.go, …) is the
        # one sanctioned consumer and lives outside those globs, so it is
        # naturally unmatched. Test files are exempt (consistent with
        # cli-backend-scope) — fixtures may construct internal state directly.
        cli-sandbox-scope:
          list-mode: lax
          files:
            - "**/internal/cli/**"
            - "**/internal/mcpsrv/**"
            - "!$test"
          deny:
            - pkg: "github.com/kstenerud/yoloai/internal/sandbox"
              desc: "internal/cli and internal/mcpsrv must reach sandbox behavior through the public yoloai spine (Client / Sandbox / Workdir / SystemClient and yoloai.* re-exports), not the internal/sandbox façade or any leaf subpackage (store/patch/archetype/…) — F1 Half-B + G2."
    forbidigo:
      # Ban raw os file-creation calls. Use internal/fileutil wrappers instead
      # so files are chowned to the real user when yoloai runs under sudo.
      forbid:
        - pattern: "^os\\.WriteFile$"
          msg: "use fileutil.WriteFile (handles sudo chown)"
        - pattern: "^os\\.OpenFile$"
          msg: "use fileutil.OpenFile (handles sudo chown on O_CREATE)"
        - pattern: "^os\\.MkdirAll$"
          msg: "use fileutil.MkdirAll (handles sudo chown)"

        # W-L10 / Q-W.6 enforcement of development-principles.md §12 (No
        # ambient configuration). Library boundaries take all configuration
        # as explicit arguments; ambient HOME / config / cache / cwd are
        # resolved only at the outermost layer (CLI startup) and passed
        # down as a config.Layout. A future regression that calls these
        # outside the allowlist silently reintroduces the ambient-HOME leak
        # Q-W.6 just deleted across 85 files.
        - pattern: "^os\\.UserHomeDir$"
          msg: "use cliutil.Layout() (CLI) or the config.Layout passed in (library); only internal/cli/cliutil/layout.go may call os.UserHomeDir directly — see development-principles.md §12"
        - pattern: "^os\\.UserConfigDir$"
          msg: "yoloai does not use the XDG config dir; resolve paths via config.Layout — see development-principles.md §12"
        - pattern: "^os\\.UserCacheDir$"
          msg: "yoloai does not use the XDG cache dir; resolve paths via config.Layout.CacheDir() — see development-principles.md §12"
        - pattern: "^os\\.Getwd$"
          msg: "no silent CWD-as-default; commands accepting paths must take them explicitly — see development-principles.md §12"

        # F13 enforcement: never derive HomeDir from DataDir. config.Layout
        # carries HomeDir as a separate field; library callers use
        # layout.HomeDir directly. Pre-F13 every site recomputed
        # filepath.Dir(layout.DataDir), which baked the "DataDir is always
        # $HOME/.yoloai" assumption into 35+ call sites and silently broke
        # for embedders whose DataDir lived elsewhere (system installs,
        # multi-tenant per-user roots).
        - pattern: "filepath\\.Dir\\(.*\\.DataDir\\)"
          msg: "use layout.HomeDir; the F13 contract is that config.Layout carries HomeDir as a separate field — see internal/config/layout.go"

        # F31 enforcement: library code never reads the process UID/GID
        # directly. config.Layout carries HostUID, HostGID, ProcessIsRoot;
        # the CLI's single licensed read (via fileutil.HostUID /
        # fileutil.HostGID / fileutil.ProcessIsRoot) feeds Layout. Library
        # callers read layout.HostUID / layout.HostGID / layout.ProcessIsRoot.
        # See development-principles.md §12 (No ambient configuration).
        - pattern: "^os\\.Getuid$"
          msg: "use layout.HostUID (or fileutil.HostUID at the OS boundary); library code must not read the process UID directly — see internal/config/layout.go"
        - pattern: "^os\\.Getgid$"
          msg: "use layout.HostGID (or fileutil.HostGID at the OS boundary); library code must not read the process GID directly — see internal/config/layout.go"

        # DEV §12 git-executor consolidation. The curated git subprocess env is
        # built in exactly one place — config.HostEnv.EnvForGitInvocation
        # (host_env.go), the sealed accessor that git.NewHost / git.NewSandbox
        # call. Every git invocation routes through *git.Git, so no other package
        # needs to assemble a git env; a stray sysexec.GitEnv call signals a
        # caller that bypassed the HostEnv accessor and the git executor.
        - pattern: "^sysexec\\.GitEnv$"
          msg: "build git envs via layout.Env().EnvForGitInvocation() (used by git.NewHost / git.NewSandbox); do not call sysexec.GitEnv directly — DEV §12"

        # DF19 test-edge env consolidation. The host environment is read in
        # exactly one place — testutil.GetCuratedHostEnv — which REQUIRES an
        # allowlist, so a caller obtains only the vars it names, never the whole
        # ambient map (curation at the source, not just before exec). New callers
        # must be added to the exclusions.rules allowlist below: a deliberate,
        # reviewed test-edge. (Calls inside the testutil package are unqualified
        # `GetCuratedHostEnv()` and do not match this pattern, so testutil itself
        # needs no exclusion.)
        - pattern: "^testutil\\.GetCuratedHostEnv$"
          msg: "the host environment is read in exactly one place (testutil.GetCuratedHostEnv), and only with an explicit allowlist; new callers must be added to the .golangci.yml allowlist — a deliberate, reviewed test-edge (§12). Unit/production code must not read the ambient env."

        # DEV §12 HostEnv curation seal. config.Layout.env is unexported and is
        # read only through the purpose-named config.HostEnv accessors reached via
        # layout.Env() (host_env.go). Every EnvFor… accessor and PassthroughEnv is
        # deny-by-default: a call site that pulls host env must justify which
        # purpose it names and be added to the reviewed exclusions.rules allowlist
        # below, so every env touch in the codebase stays greppable and reviewed.
        # (The honest non-env queries InHostTmux/TerminalColumns are not gated —
        # they hand back a bool/int, not env.)
        - pattern: "\\.EnvFor[A-Z]\\w*$"
          msg: "EnvFor… accessors hand out curated host env by named purpose; every call site must be reviewed and added to the .golangci.yml exclusions allowlist (DEV §12)."
        - pattern: "\\.PassthroughEnv$"
          msg: "PassthroughEnv hands the full host env to a `yoloai x` extension; it is the single sanctioned passthrough. Add reviewed callers to the .golangci.yml allowlist (DEV §12)."

        # §12 ambient-configuration hardening (deny by default). Ambient
        # process state — environment, identity, host, process I/O — must be
        # resolved at the outermost layer (CLI startup / explicit args) and
        # threaded down, never read ad-hoc by library code. Every legitimate
        # touch carries an inline `//nolint:forbidigo // <reason>`, or a
        # path exclusion below for a file whose job IS to be that boundary.
        # The one standing exception is agent API keys (published via
        # agent.Definition.APIKeyEnvVars). NOT banned, deliberately:
        # os.Getpid (our own PID — self-identity), os.Getpagesize (hardware
        # constant), os.Expand (pure given an explicit mapping).
        - pattern: "^os\\.Getenv$"
          msg: "ambient env: resolve at the CLI boundary and thread the value; agent API keys are the one §12 exception — justify inline if so"
        - pattern: "^os\\.LookupEnv$"
          msg: "ambient env — resolve at the boundary and thread it; §12"
        - pattern: "^os\\.Environ$"
          msg: "ambient env dump — build an explicit env for the subprocess; §12"
        - pattern: "^os\\.ExpandEnv$"
          msg: "ambient env expansion — use os.Expand with an explicit mapping; §12"
        - pattern: "^os\\.Setenv$"
          msg: "mutating the process environment is forbidden — thread config explicitly; §12"
        - pattern: "^os\\.Unsetenv$"
          msg: "mutating the process environment is forbidden; §12"
        - pattern: "^os\\.Clearenv$"
          msg: "mutating the process environment is forbidden; §12"
        - pattern: "^os\\.Chdir$"
          msg: "mutating the process working directory is forbidden — pass explicit paths and resolve relative to them; §12 (companion to the os.Getwd read ban)"
        - pattern: "^os\\.Args$"
          msg: "ambient command-line args — the CLI (cobra) owns argv and threads explicit values down; library code must not read os.Args; §12"
        - pattern: "^os\\.Geteuid$"
          msg: "ambient identity — use layout.HostUID / fileutil; §12"
        - pattern: "^os\\.Getegid$"
          msg: "ambient identity — use layout.HostGID / fileutil; §12"
        - pattern: "^os\\.Getgroups$"
          msg: "ambient identity — resolve at the boundary; §12"
        - pattern: "^os\\.Getppid$"
          msg: "ambient process state — only fileutil's sudo-recovery legitimately reads it; §12"
        - pattern: "^os\\.Hostname$"
          msg: "ambient host identity — pass it explicitly; §12"
        - pattern: "^os\\.Stdin$"
          msg: "ambient I/O — take an io.Reader / IOStreams; the CLI layer owns process streams; §12"
        - pattern: "^os\\.Stdout$"
          msg: "ambient I/O — take an io.Writer / IOStreams; the CLI layer owns process streams; §12"
        - pattern: "^os\\.Stderr$"
          msg: "ambient I/O — take an io.Writer / IOStreams; the CLI layer owns process streams; §12"

        # §12 outward: a child process inherits the parent's full ambient env
        # when Cmd.Env is unset (exec's default). Never call exec.Command* raw —
        # go through internal/sysexec, which requires an explicit env. This binds
        # test code too (the _test.go exclusion below deliberately omits this
        # pattern). exec.LookPath (binary discovery) is fine. See DEV §12 / D79.
        - pattern: "^exec\\.Command(Context)?$"
          msg: "spawn subprocesses via internal/sysexec (explicit env, never inherited); see development-principles.md section 12 — exec.LookPath is fine"

        # §12 stdio by ANY mechanism. The os.Stdin/Stdout/Stderr bans above
        # cover the symbols; these cover the package-level wrappers and
        # builtins that hit the SAME process streams without naming them, so a
        # regression can't reach process I/O through fmt/log/print to leak data
        # from the process rather than the principal (and vice versa). Library
        # code takes an explicit io.Reader/Writer (or the threaded slog.Logger
        # for diagnostics); the CLI and cmd/ entrypoint — the stdio-owning
        # boundary — are excluded below.
        - pattern: "^fmt\\.Print$"
          msg: "ambient stdout — write to an injected io.Writer, e.g. fmt.Fprint(w, …); §12"
        - pattern: "^fmt\\.Printf$"
          msg: "ambient stdout — write to an injected io.Writer, e.g. fmt.Fprintf(w, …); §12"
        - pattern: "^fmt\\.Println$"
          msg: "ambient stdout — write to an injected io.Writer, e.g. fmt.Fprintln(w, …); §12"
        - pattern: "^fmt\\.Scan$"
          msg: "ambient stdin — read from an injected io.Reader, e.g. fmt.Fscan(r, …); §12"
        - pattern: "^fmt\\.Scanf$"
          msg: "ambient stdin — read from an injected io.Reader, e.g. fmt.Fscanf(r, …); §12"
        - pattern: "^fmt\\.Scanln$"
          msg: "ambient stdin — read from an injected io.Reader, e.g. fmt.Fscanln(r, …); §12"
        - pattern: "^print$"
          msg: "builtin print writes to stderr — use an injected io.Writer or the threaded slog.Logger; §12"
        - pattern: "^println$"
          msg: "builtin println writes to stderr — use an injected io.Writer or the threaded slog.Logger; §12"
        - pattern: "^log\\.(Print|Printf|Println|Fatal|Fatalf|Fatalln|Panic|Panicf|Panicln)$"
          msg: "the log default logger writes to stderr — use the threaded slog.Logger; §12"
        - pattern: "^syscall\\.Getenv$"
          msg: "ambient env backdoor below os — forbidden; §12"
        - pattern: "^syscall\\.Setenv$"
          msg: "mutating the process environment is forbidden; §12"
        - pattern: "^syscall\\.Environ$"
          msg: "ambient env backdoor below os — forbidden; §12"
        - pattern: "^syscall\\.Getuid$"
          msg: "identity backdoor below os.Getuid — use layout.HostUID / fileutil; §12"
        - pattern: "^syscall\\.Getgid$"
          msg: "identity backdoor below os.Getgid — use layout.HostGID / fileutil; §12"
        - pattern: "^syscall\\.Geteuid$"
          msg: "identity backdoor below os.Geteuid — use layout.HostUID / fileutil; §12"
        - pattern: "^syscall\\.Getegid$"
          msg: "identity backdoor below os.Getegid — use layout.HostGID / fileutil; §12"
        - pattern: "^syscall\\.Getgroups$"
          msg: "identity backdoor below os.Getgroups — resolve at the boundary; §12"
        - pattern: "^syscall\\.Getppid$"
          msg: "process-state backdoor below os.Getppid — only fileutil's sudo recovery legitimately reads it; §12"
        - pattern: "^user\\.Current$"
          msg: "ambient user identity — resolve at the CLI boundary; §12"
        - pattern: "^user\\.Lookup$"
          msg: "ambient user lookup — only the CLI HOME-resolution boundary may use it; §12"
        - pattern: "^user\\.LookupId$"
          msg: "ambient user lookup — resolve at the boundary; §12"
        - pattern: "^user\\.LookupGroup$"
          msg: "ambient group lookup — resolve at the CLI boundary; §12"
        - pattern: "^user\\.LookupGroupId$"
          msg: "ambient group lookup — resolve at the boundary; §12"
        - pattern: "^time\\.Local$"
          msg: "ambient timezone — only intentional local-time parsing of user input may use it; justify inline; §12"

        # W-L10 enforcement of the W-L8 spine layering. The CLI must
        # consume orchestration through yoloai.Client / yoloai.SystemClient,
        # not by constructing sandbox.Manager or holding a raw
        # runtime.Runtime. The chokepoint and residual-debt allowlist
        # is below under exclusions.rules.
        - pattern: "^sandbox\\.NewManager$"
          msg: "use yoloai.NewWithOptions (which wraps the Manager); CLI command handlers call it via cliutil.WithClient — see internal/cli/CONVENTIONS.md"
        - pattern: "^sandbox\\.Manager$"
          msg: "use yoloai.Client; CLI commands access orchestration via cliutil.WithClient / cliutil.NewSystemClient — see internal/cli/CONVENTIONS.md"
        - pattern: "^runtime\\.New$"
          msg: "use cliutil.NewRuntime (the documented chokepoint in internal/cli/cliutil/client.go)"
        - pattern: "^runtime\\.Runtime$"
          msg: "depend on yoloai.Client / yoloai.SystemClient instead of the bare backend interface — see internal/cli/CONVENTIONS.md"
  exclusions:
    rules:
      # The fileutil package itself is allowed to call the stdlib functions it wraps.
      - path: "internal/fileutil/fileutil\\.go"
        linters:
          - forbidigo
      # config.HostEnv.EnvForGitInvocation (host_env.go) is THE site that
      # assembles the curated git subprocess env (it wraps sysexec.GitEnv over
      # the sealed snapshot); git.NewHost / git.NewSandbox route through it.
      # Every other package routes git through *git.Git, so the sysexec.GitEnv
      # ban applies everywhere else.
      - path: "internal/config/host_env\\.go"
        linters:
          - forbidigo
        text: "sysexec\\.GitEnv"

      # config.HostEnv accessor allowlists (DEV §12). Each EnvFor… accessor and
      # PassthroughEnv is deny-by-default; the reviewed call sites are listed
      # here, one rule per purpose so the legitimate readers of each kind of host
      # env stay greppable in one place. Path-scoped to specific files; do NOT
      # exclude whole dirs. Root-level files (client.go/system.go/diagnostics.go)
      # use (^|/) so the module-root path matches.
      - path: "internal/git/git\\.go"
        linters: [forbidigo]
        text: "\\.EnvForGitInvocation"
      - path: "internal/runtime/docker/docker\\.go"
        linters: [forbidigo]
        text: "\\.EnvForDockerExec"
      - path: "internal/runtime/docker/build\\.go|internal/runtime/containerd/image\\.go"
        linters: [forbidigo]
        text: "\\.EnvForDockerBuild"
      - path: "internal/runtime/containerd/containerd\\.go"
        linters: [forbidigo]
        text: "\\.EnvForContainerdExec"
      - path: "internal/runtime/seatbelt/seatbelt\\.go"
        linters: [forbidigo]
        text: "\\.EnvForSeatbelt(Exec|Sandbox)"
      - path: "internal/runtime/tart/tart\\.go"
        linters: [forbidigo]
        text: "\\.EnvForTartInvocation"
      - path: "internal/runtime/apple/apple\\.go"
        linters: [forbidigo]
        text: "\\.EnvForAppleContainer"
      # Daemon-socket discovery: backend probes/clients + the CLI commands that
      # select a container backend. discovery.go's System.BackendInstalled probes
      # the installed tier with the same daemon-discovery env subset.
      - path: "(^|/)client\\.go$|(^|/)discovery\\.go$|internal/runtime/docker/docker\\.go|internal/runtime/podman/podman\\.go|internal/cli/cliutil/client\\.go|internal/cli/mcp/mcp\\.go|internal/cli/lifecycle/stop\\.go|internal/cli/lifecycle/destroy\\.go"
        linters: [forbidigo]
        text: "\\.EnvForDaemonDiscovery"
      # Host-utility subprocesses (tmux, vscode, file copies, rsync, uname).
      - path: "(^|/)diagnostics\\.go$|internal/sandbox/files\\.go|internal/sandbox/lifecycle/reset\\.go|internal/cli/cliutil/terminal\\.go|internal/cli/sandboxcmd/bugreport\\.go|internal/cli/sandboxcmd/vscode\\.go"
        linters: [forbidigo]
        text: "\\.EnvForHostTool"
      - path: "(^|/)diagnostics\\.go$"
        linters: [forbidigo]
        text: "\\.EnvForDiagnostics"
      # ${VAR} config/profile interpolation: the config parse entry points and
      # every ExpandPath call site that resolves a user-supplied path.
      - path: "internal/config/config\\.go|internal/config/profile\\.go|internal/sandbox/lifecycle/start\\.go|internal/sandbox/lifecycle/restart\\.go|internal/sandbox/provision/provision\\.go|internal/sandbox/create/create\\.go|internal/sandbox/create/prepare_profile\\.go|internal/sandbox/create/prepare_archetype\\.go|internal/sandbox/mounts/mounts\\.go|internal/cli/mcp/mcp\\.go|internal/cli/lifecycle/new\\.go|internal/cli/workflow/apply\\.go"
        linters: [forbidigo]
        text: "\\.EnvForConfigInterpolation"
      # Agent credentials: the provisioning/seed/model-prefix/doctor readers that
      # resolve an agent definition's declared credential keys.
      - path: "(^|/)system\\.go$|internal/sandbox/invocation/invocation\\.go|internal/sandbox/provision/provision\\.go|internal/sandbox/create/prepare_dirs\\.go"
        linters: [forbidigo]
        text: "\\.EnvForAgentCredentials"
      # PassthroughEnv: the single `yoloai x` extension runner that hands the
      # user's full edge env to their script (by design).
      - path: "internal/cli/xcmd/x\\.go"
        linters: [forbidigo]
        text: "\\.PassthroughEnv"
      # DF19 testutil.GetCuratedHostEnv allowlist — the licensed test-edge callers
      # of the one host-env read. golangci-lint does not analyze //go:build
      # integration files by default, so the ban only fires on non-tagged files;
      # this file is the sole non-tagged caller default `make check` flags. The
      # integration callers (docker/podman/sandbox *_test.go) are tagged and so
      # are not analyzed by default — they need no entry here. Keep this
      # path-scoped to the specific test-edge file; do NOT exclude whole dirs.
      - path: "internal/sandbox/create/fakeruntime_test\\.go"
        linters:
          - forbidigo
        text: "testutil\\.GetCuratedHostEnv"
      # Tests may use the ambient-state patterns (temp files, stdio, identity,
      # etc.) — EXCEPT the full-ambient-env dumps (os.Environ / syscall.Environ)
      # and exec.Command*, which bind tests too (DEV §12 / D79: a subprocess gets
      # an explicit, curated env via internal/sysexec — handing it os.Environ()
      # is functionally identical to inheriting the parent env and curates
      # nothing, in test code as well). So this lists the patterns tests ARE
      # exempt from; os.Environ, syscall.Environ, and exec.Command are
      # deliberately ABSENT. The one licensed test-edge env read
      # (testutil.GetCuratedHostEnv) carries its own inline nolint and reads only
      # an allowlist; its qualified callers are gated by the
      # testutil.GetCuratedHostEnv forbid + the DF19 allowlist above. When adding
      # a new forbidigo pattern that tests should be exempt from, add its matched
      # symbol here.
      - path: "_test\\.go"
        linters:
          - forbidigo
        text: "os\\.(WriteFile|OpenFile|MkdirAll|UserHomeDir|UserConfigDir|UserCacheDir|Getwd|Getuid|Getgid|Getenv|LookupEnv|ExpandEnv|Setenv|Unsetenv|Clearenv|Chdir|Args|Geteuid|Getegid|Getgroups|Getppid|Hostname|Stdin|Stdout|Stderr)|filepath\\.Dir|fmt\\.(Print|Printf|Println|Scan|Scanf|Scanln)|^print(ln)?$|log\\.(Print|Printf|Println|Fatal|Fatalf|Fatalln|Panic|Panicf|Panicln)|syscall\\.(Getenv|Setenv|Getuid|Getgid|Geteuid|Getegid|Getgroups|Getppid)|user\\.(Current|Lookup|LookupId|LookupGroup|LookupGroupId)|time\\.Local|sandbox\\.(NewManager|Manager)|runtime\\.(New|Runtime)|\\.EnvFor[A-Z]\\w*|\\.PassthroughEnv"
      # internal/sysexec is THE licensed exec.Command* site — the funnel that
      # sets an explicit env; every other caller routes through it.
      #
      # testutil is the shared test-helper package; it gets the SAME exemption
      # surface as _test.go (NOT a blanket forbidigo pass) so os.Environ /
      # syscall.Environ / exec.Command are still banned here too. Its one
      # licensed env read (GetCuratedHostEnv, which feeds GitEnv and the
      # integration layout) carries an inline nolint and reads only an allowlist.
      - path: "internal/testutil/"
        linters:
          - forbidigo
        text: "os\\.(WriteFile|OpenFile|MkdirAll|UserHomeDir|UserConfigDir|UserCacheDir|Getwd|Getuid|Getgid|Getenv|LookupEnv|ExpandEnv|Setenv|Unsetenv|Clearenv|Chdir|Args|Geteuid|Getegid|Getgroups|Getppid|Hostname|Stdin|Stdout|Stderr)|filepath\\.Dir|fmt\\.(Print|Printf|Println|Scan|Scanf|Scanln)|^print(ln)?$|log\\.(Print|Printf|Println|Fatal|Fatalf|Fatalln|Panic|Panicf|Panicln)|syscall\\.(Getenv|Setenv|Getuid|Getgid|Geteuid|Getegid|Getgroups|Getppid)|user\\.(Current|Lookup|LookupId|LookupGroup|LookupGroupId)|time\\.Local|sandbox\\.(NewManager|Manager)|runtime\\.(New|Runtime)|\\.EnvFor[A-Z]\\w*|\\.PassthroughEnv"
      - path: "internal/sysexec/"
        linters:
          - forbidigo
        text: "exec\\.Command"
      # The licensed CLI startup site that resolves $HOME/.yoloai/ once at
      # process boot and threads the resulting config.Layout downward. This
      # is the ONLY production-code allowlist for the §12 ambient-HOME ban.
      # (Moved from internal/cli/layout_bridge.go → internal/cli/cliutil/layout.go
      # during W-L13's cliutil/ extraction.)
      - path: "internal/cli/cliutil/layout\\.go"
        linters:
          - forbidigo
        text: "os\\.UserHomeDir|os\\.Getenv|os\\.Environ|user\\.Lookup"

      # §12 process-boundary symbols the CLI layer legitimately owns: the
      # process's stdin/stdout/stderr (wired into IOStreams; command output
      # and warnings) and argv (os.Args — bugreport command capture and the
      # runtime-alias sniff). Library packages must instead take explicit
      # io.Reader/Writer / threaded values (justified inline where they
      # legitimately can't). Scoped to these symbols so env/identity reads in
      # cli/ are still individually justified.
      - path: "^internal/cli/"
        linters:
          - forbidigo
        text: "os\\.(Stdin|Stdout|Stderr|Args)"

      # §12 stdio-by-mechanism boundary: the CLI and the cmd/ entrypoint own
      # the process's stdin/stdout/stderr, so they may print/scan through fmt,
      # the builtins, or the log default logger. Library packages take explicit
      # io.Reader/Writer instead (justified inline where they legitimately
      # can't). The CLI in practice uses fmt.Fprintf(cmd.OutOrStdout()); this
      # exclusion just keeps the boundary unconstrained.
      - path: "^(internal/cli/|cmd/)"
        linters:
          - forbidigo
        text: "fmt\\.(Print|Printf|Println|Scan|Scanf|Scanln)|^print(ln)?$|log\\.(Print|Printf|Println|Fatal|Fatalf|Fatalln|Panic|Panicf|Panicln)"

      # The MCP stdio proxy is a transport boundary: it bridges the MCP
      # client's stdin/stdout to the in-sandbox process, so owning the
      # process streams is precisely its job.
      - path: "internal/mcpsrv/proxy\\.go"
        linters:
          - forbidigo
        text: "os\\.(Stdin|Stdout|Stderr)"

      # W-L10 spine-layering allowlist. The orchestration spine itself
      # (the root yoloai package — client.go, system.go, discovery.go,
      # tart_bases.go) and the runtime/sandbox packages naturally use
      # these symbols — only the CLI is constrained. discovery.go and
      # tart_bases.go formerly funneled through a private newRuntime
      # wrapper in client.go; that wrapper was a pure pass-through to
      # runtime.New (its old "" → docker default was removed when we
      # made an explicit backend mandatory), so it was dropped and these
      # spine files now call runtime.New directly like system.go.
      # After W-L8d completed, no internal/cli/ file has callers of
      # sandbox.Manager / sandbox.NewManager left, including
      # system_mcp.go (which now uses yoloai.Client) and helpers.go
      # (which dropped withRuntime / withManager when they became
      # unused). internal/mcpsrv/ doesn't need an exemption either —
      # it migrated to *yoloai.Client and references only sandbox
      # value types (DirSpec, Status constants, CreateOptions).
      - path: "^client\\.go$|^system\\.go$|^discovery\\.go$|^tart_bases\\.go$|^internal/runtime/|^internal/sandbox/|^internal/git/"
        linters:
          - forbidigo
        text: "sandbox\\.(NewManager|Manager)|runtime\\.(Runtime|New)"

      # NewRuntime in cliutil/client.go is the only sanctioned construction
      # site for a raw runtime.Runtime in CLI code. After F23 moved
      # cross-backend enumeration (list, system_doctor, info) onto
      # yoloai.SystemClient, the remaining callers are cliutil.CheckBackend
      # (the backend availability-probe chokepoint) and the backend-scoped
      # system_tart subtree.
      # (Moved from internal/cli/helpers.go → internal/cli/cliutil/client.go
      # during W-L13's cliutil/ extraction.)
      - path: "internal/cli/cliutil/client\\.go"
        linters:
          - forbidigo
        text: "runtime\\.(Runtime|New)"

run:
  timeout: 2m
