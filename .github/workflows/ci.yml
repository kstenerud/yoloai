name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          args: --help

      # `make check` requires hadolint (D112) and no longer skips when it is
      # absent. It previously "worked" here only because ubuntu-latest happens to
      # ship Docker and the Makefile fell back to it — an incidental property, not
      # a contract (GEN §14). Install it explicitly.
      - name: Install hadolint
        env:
          HADOLINT_VERSION: v2.14.0
        run: |
          base="https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}"
          curl -fsSL -o /tmp/hadolint "${base}/hadolint-linux-x86_64"
          curl -fsSL -o /tmp/hadolint.sha256 "${base}/hadolint-linux-x86_64.sha256"
          echo "$(cut -d' ' -f1 /tmp/hadolint.sha256)  /tmp/hadolint" | sha256sum -c -
          sudo install -m 0755 /tmp/hadolint /usr/local/bin/hadolint
          hadolint --version

      - name: Install Python dev deps
        run: make setup-dev-python

      - name: Run checks
        run: make check

  integration:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build base image
        run: make base-image

      - name: Run integration tests
        # Mandatory-infra policy (D112): a platform-possible backend that's absent
        # FAILS; the only carve-out is this env, for backends THIS runner genuinely
        # cannot provision. GitHub-hosted runners give no nested KVM, so the
        # containerd Kata backend is unprovisionable here — carve it out. Docker
        # stays mandatory (provisioned on the runner); apple/seatbelt/tart are
        # macOS-only and self-exclude on Linux via their TestMain GOOS guard.
        env:
          YOLOAI_TEST_UNCONTROLLED_BACKENDS: containerd
        run: make integration

      - name: Run e2e tests
        run: make e2e

  integration-podman:
    runs-on: ubuntu-24.04
    needs: check
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify Podman installation
        run: |
          podman version
          podman info

      - name: Start Podman socket
        run: |
          systemctl --user enable --now podman.socket
          systemctl --user status podman.socket --no-pager

      - name: Build image and run Podman integration tests
        run: make integration-podman
